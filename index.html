<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>כובש השטחים</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;color:#fff;direction:rtl;user-select:none;-webkit-user-select:none;transition:background 1s;}
h1{font-size:24px;margin-bottom:8px;transition:color 0.8s;}
#hud{display:flex;gap:10px;margin-bottom:8px;font-size:14px;font-weight:bold;flex-wrap:wrap;justify-content:center;}
.chip{background:rgba(255,255,255,0.08);padding:4px 14px;border-radius:20px;display:flex;align-items:center;gap:5px;}
canvas{display:block;border:2px solid rgba(255,255,255,0.12);border-radius:4px;transition:border-color 1s,box-shadow 1s;}
#hint{margin-top:6px;font-size:12px;opacity:0.4;text-align:center;}
#game-wrap{display:grid;grid-template-areas:'.    up   .'' left mid  right''.    down .';grid-template-columns:58px auto 58px;grid-template-rows:58px auto 58px;gap:6px;align-items:center;justify-items:center;}
#game-wrap canvas{grid-area:mid;}
.db{width:50px;height:50px;background:rgba(255,255,255,0.13);border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;color:white;font-size:22px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;transition:background 0.1s,transform 0.08s;-webkit-tap-highlight-color:transparent;}
.db:active{background:rgba(255,255,255,0.35);transform:scale(0.91);}
#dbU{grid-area:up;}#dbD{grid-area:down;}#dbL{grid-area:left;}#dbR{grid-area:right;}

/* Game over overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);align-items:center;justify-content:center;z-index:20;}
#overlay.show{display:flex;}
.modal{background:#12122a;border:2px solid rgba(255,255,255,0.2);border-radius:14px;padding:28px 36px;text-align:center;}
.modal h2{font-size:24px;margin-bottom:8px;}
.modal p{margin-bottom:20px;opacity:0.75;font-size:14px;}
.btn-row{display:flex;gap:10px;justify-content:center;}
.modal button{padding:10px 24px;border:none;border-radius:7px;color:white;font-size:15px;cursor:pointer;transition:opacity 0.2s;}
.modal button:hover{opacity:0.8;}
#btnMenu{background:#444;}
#btnNext{background:#7b2ff7;display:none;}

/* ── Name entry screen ── */
#nameScreen{display:none;position:fixed;inset:0;background:rgba(5,5,20,0.97);align-items:center;justify-content:center;z-index:50;padding:20px;}
#nameScreen.show{display:flex;}
.name-card{background:linear-gradient(135deg,#0d1a2e,#1a0d2e);border:1px solid rgba(255,255,255,0.18);border-radius:24px;padding:36px 40px;max-width:380px;width:100%;text-align:center;}
.name-card .big-title{font-size:36px;margin-bottom:6px;}
.name-card .sub{opacity:0.6;font-size:14px;margin-bottom:24px;}
.name-card input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:18px;text-align:center;outline:none;direction:rtl;margin-bottom:16px;transition:border-color 0.2s;}
.name-card input:focus{border-color:rgba(130,80,255,0.7);}
.name-card input::placeholder{opacity:0.4;}
.name-card .start-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#7b2ff7,#4a1bb5);color:#fff;font-size:18px;font-weight:bold;cursor:pointer;transition:opacity 0.2s;}
.name-card .start-btn:hover{opacity:0.85;}

/* ── Main menu screen ── */
#menuScreen{display:none;position:fixed;inset:0;background:rgba(3,5,18,0.97);align-items:flex-start;justify-content:center;z-index:40;padding:20px;overflow-y:auto;}
#menuScreen.show{display:flex;}
.menu-inner{max-width:560px;width:100%;padding:10px 0 30px;}
.menu-title{font-size:28px;font-weight:bold;text-align:center;margin-bottom:4px;}
.menu-player{text-align:center;font-size:14px;opacity:0.6;margin-bottom:20px;}
.menu-player button{background:none;border:none;color:#aa88ff;cursor:pointer;font-size:13px;text-decoration:underline;padding:0 4px;}

/* Score cards */
.score-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.score-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:14px;text-align:center;}
.score-card .sc-label{font-size:12px;opacity:0.5;margin-bottom:6px;}
.score-card .sc-num{font-size:26px;font-weight:bold;color:#f1c40f;}
.score-card .sc-name{font-size:12px;opacity:0.65;margin-top:4px;}
.score-card .sc-empty{font-size:14px;opacity:0.3;margin-top:4px;}

/* Leaderboard */
.lb-title{font-size:14px;opacity:0.5;margin-bottom:8px;text-align:center;}
.lb-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:14px;}
.lb-table tr:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.06);}
.lb-table td{padding:6px 8px;}
.lb-table .rank{opacity:0.4;width:24px;}
.lb-table .lb-score{color:#f1c40f;font-weight:bold;text-align:left;}
.lb-table .lb-date{opacity:0.35;font-size:11px;text-align:left;}

/* Level buttons */
.level-pick-title{font-size:14px;opacity:0.55;text-align:center;margin-bottom:10px;}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;}
.lvl-btn{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:12px;color:#fff;padding:10px 4px;cursor:pointer;text-align:center;font-size:13px;line-height:1.4;transition:all 0.15s;}
.lvl-btn:hover{background:rgba(255,255,255,0.14);}
.lvl-btn.active{background:rgba(100,50,220,0.35);border-color:rgba(130,80,255,0.7);}
.lvl-btn .lvl-icon{font-size:20px;display:block;margin-bottom:4px;}
.lvl-btn .lvl-pts{font-size:11px;opacity:0.55;}
.menu-start-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#7b2ff7,#4a1bb5);color:#fff;font-size:20px;font-weight:bold;cursor:pointer;transition:opacity 0.2s;letter-spacing:1px;}
.menu-start-btn:hover{opacity:0.88;}
</style>
</head>
<body>

<!-- ══ NAME ENTRY SCREEN ══ -->
<div id="nameScreen">
  <div class="name-card">
    <div class="big-title">🏆</div>
    <div style="font-size:22px;font-weight:bold;margin-bottom:6px;">כובש השטחים</div>
    <div class="sub">הכנס את שמך כדי לשמור את הניקוד שלך</div>
    <input type="text" id="nameInput" placeholder="השם שלך..." maxlength="18"
      onkeydown="if(event.key==='Enter')submitName()">
    <button class="start-btn" onclick="submitName()">🎮 בואו נשחק!</button>
  </div>
</div>

<!-- ══ MAIN MENU SCREEN ══ -->
<div id="menuScreen">
  <div class="menu-inner">
    <div class="menu-title">🏆 כובש השטחים</div>
    <div class="menu-player">
      שלום, <strong id="menuPlayerName">שחקן</strong>!
      <button onclick="showNameScreen()">שנה שם</button>
    </div>

    <!-- Score cards -->
    <div class="score-row">
      <div class="score-card">
        <div class="sc-label">🌟 שיא יומי</div>
        <div class="sc-num" id="dailyNum">-</div>
        <div class="sc-name" id="dailyWho"></div>
      </div>
      <div class="score-card">
        <div class="sc-label">👑 שיא כל הזמנים</div>
        <div class="sc-num" id="allTimeNum">-</div>
        <div class="sc-name" id="allTimeWho"></div>
      </div>
    </div>

    <!-- Top 5 leaderboard -->
    <div class="lb-title">🏅 טבלת שיאים</div>
    <table class="lb-table" id="lbTable">
      <tr><td colspan="4" style="text-align:center;opacity:0.3;padding:10px">אין ניקוד עדיין — היה ראשון!</td></tr>
    </table>

    <!-- Level selector -->
    <div class="level-pick-title">בחר שלב להתחלה:</div>
    <div class="level-grid" id="levelGrid">
      <button class="lvl-btn active" onclick="selectMenuLevel(1)">
        <span class="lvl-icon">⭐</span>שלב 1<br><span class="lvl-pts">100 נק'</span>
      </button>
      <button class="lvl-btn" onclick="selectMenuLevel(2)">
        <span class="lvl-icon">🚀</span>שלב 2<br><span class="lvl-pts">150 נק'</span>
      </button>
      <button class="lvl-btn" onclick="selectMenuLevel(3)">
        <span class="lvl-icon">🕷️</span>שלב 3<br><span class="lvl-pts">200 נק'</span>
      </button>
      <button class="lvl-btn" onclick="selectMenuLevel(4)">
        <span class="lvl-icon">👾</span>שלב 4<br><span class="lvl-pts">150 נק'</span>
      </button>
      <button class="lvl-btn" onclick="selectMenuLevel(5)">
        <span class="lvl-icon">🧜‍♀️</span>שלב 5<br><span class="lvl-pts">200 נק'</span>
      </button>
    </div>

    <button class="menu-start-btn" onclick="startFromMenu()">התחל משחק! 🎮</button>
  </div>
</div>

<!-- ══ GAME UI ══ -->
<h1 id="title" style="display:none">⚡ כובש השטחים</h1>
<div id="hud" style="display:none">
  <div class="chip">❤️ <span id="livesEl">3</span></div>
  <div class="chip">⭐ <span id="scoreEl">0</span></div>
  <div class="chip">📊 <span id="pctEl">0</span>%</div>
  <div class="chip" id="levelChip">שלב 1</div>
  <div class="chip">🎯 יעד: <span id="goalEl">60</span>%</div>
</div>

<div id="game-wrap" style="display:none">
  <button class="db" id="dbU" onmousedown="dp('u')" ontouchstart="dp('u');event.preventDefault()">↑</button>
  <button class="db" id="dbL" onmousedown="dp('r')" ontouchstart="dp('r');event.preventDefault()">→</button>
  <canvas id="c"></canvas>
  <button class="db" id="dbR" onmousedown="dp('l')" ontouchstart="dp('l');event.preventDefault()">←</button>
  <button class="db" id="dbD" onmousedown="dp('d')" ontouchstart="dp('d');event.preventDefault()">↓</button>
</div>
<div id="hint" style="display:none"></div>

<!-- Win/Lose overlay -->
<div id="overlay">
  <div class="modal">
    <h2 id="oTitle">-</h2>
    <p id="oMsg">-</p>
    <div class="btn-row">
      <button id="btnNext" onclick="nextLevel()">שלב הבא</button>
      <button id="btnMenu" onclick="goToMenu()">📋 תפריט</button>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const W=52,H=38,CS=13;
const WIN_PCT={1:0.60,2:0.75,3:0.75,4:1.0,5:1.0};
const LEVEL_SCORES={1:100,2:150,3:200,4:150,5:200};
const PLAYER_SPD=7,EMPTY=0,FILLED=1,TAIL=2,MAX_WEB=90,BALL_R=8;
const canvas=document.getElementById('c');
canvas.width=W*CS; canvas.height=H*CS;
const ctx=canvas.getContext('2d');
const CW=canvas.width,CH=canvas.height;
const inB=(x,y)=>x>=0&&x<W&&y>=0&&y<H;

// ── Score / Player ─────────────────────────────────────────────────────────────
let playerName='';
let currentScore=0;
let menuLevel=1;

function getScores(){try{return JSON.parse(localStorage.getItem('kbs_scores')||'[]');}catch{return[];}}
function persistScore(){
  if(currentScore<=0)return;
  const all=getScores();
  all.push({name:playerName,score:currentScore,date:new Date().toISOString()});
  if(all.length>200)all.splice(0,all.length-200);
  localStorage.setItem('kbs_scores',JSON.stringify(all));
  currentScore=0;
}
function getDailyHigh(){const today=new Date().toDateString();return getScores().filter(s=>new Date(s.date).toDateString()===today).reduce((b,s)=>s.score>(b?.score||0)?s:b,null);}
function getAllTimeHigh(){return getScores().reduce((b,s)=>s.score>(b?.score||0)?s:b,null);}
function getTopN(n){return getScores().sort((a,b)=>b.score-a.score).slice(0,n);}
function fmtDate(iso){const d=new Date(iso);return`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;}

// ── Screen management ─────────────────────────────────────────────────────────
function showNameScreen(){
  document.getElementById('nameScreen').classList.add('show');
  document.getElementById('menuScreen').classList.remove('show');
  setTimeout(()=>document.getElementById('nameInput').focus(),100);
}
function submitName(){
  const v=document.getElementById('nameInput').value.trim();
  if(!v)return;
  playerName=v;
  localStorage.setItem('kbs_name',playerName);
  document.getElementById('nameScreen').classList.remove('show');
  showMenu();
}
function showMenu(){
  document.getElementById('title').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('game-wrap').style.display='none';
  document.getElementById('hint').style.display='none';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('btnNext').style.display='none';
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  running=false;
  // Update menu
  document.getElementById('menuPlayerName').textContent=playerName;
  // Scores
  const dh=getDailyHigh(),ah=getAllTimeHigh();
  document.getElementById('dailyNum').textContent=dh?dh.score+' נק\'':'—';
  document.getElementById('dailyWho').textContent=dh?'ע"י '+dh.name:'';
  document.getElementById('allTimeNum').textContent=ah?ah.score+' נק\'':'—';
  document.getElementById('allTimeWho').textContent=ah?'ע"י '+ah.name:'';
  // Leaderboard
  const top=getTopN(5);
  const medals=['🥇','🥈','🥉','4.','5.'];
  const tbody=document.getElementById('lbTable');
  if(top.length===0){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;opacity:0.3;padding:10px">אין ניקוד עדיין — היה ראשון!</td></tr>';}
  else{tbody.innerHTML=top.map((s,i)=>`<tr><td class="rank">${medals[i]}</td><td>${s.name}</td><td class="lb-score">${s.score}</td><td class="lb-date">${fmtDate(s.date)}</td></tr>`).join('');}
  // Highlight selected level
  document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active',i+1===menuLevel));
  document.getElementById('menuScreen').classList.add('show');
}
function selectMenuLevel(n){menuLevel=n;document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active',i+1===n));}
function startFromMenu(){
  document.getElementById('menuScreen').classList.remove('show');
  document.getElementById('title').style.display='';
  document.getElementById('hud').style.display='';
  document.getElementById('game-wrap').style.display='';
  document.getElementById('hint').style.display='';
  currentScore=0;
  lives=3;
  startLevel(menuLevel);
}
function goToMenu(){
  persistScore();
  showMenu();
}

// ── Themes ────────────────────────────────────────────────────────────────────
const THEMES={
  1:{bodyBg:'#0d0d1a',emptyColor:'#141428',fillColor:'#1a4a7a',tailColor:'#5dade2',playerGlow:'#5dade2',ringColor:'rgba(93,173,226,0.45)',canvasBorder:'rgba(255,255,255,0.12)',canvasShadow:'none',ballSpd:0.09,spiders:false,aliens:false,ballDefs:[{x:8.5,y:9.5,dx:1.1,dy:0.9,c:['#e74c3c','#f5b7b1']},{x:W-10.5,y:15.5,dx:-0.9,dy:1.2,c:['#e74c3c','#f5b7b1']},{x:W/2,y:H-10.5,dx:1.0,dy:-1.0,c:['#e74c3c','#f5b7b1']},{x:20.5,y:25.5,dx:-1.2,dy:0.8,c:['#e74c3c','#f5b7b1']}],stars:false,title:'⚡ כובש השטחים',chip:'⭐ שלב 1',nextIcon:'🚀',nextMsg:'עכשיו לחלל!'},
  2:{bodyBg:'#00000a',emptyColor:null,fillColor:'#3d0070',tailColor:'#cc44ff',playerGlow:'#cc44ff',ringColor:'rgba(180,50,255,0.55)',canvasBorder:'rgba(160,40,255,0.4)',canvasShadow:'0 0 30px rgba(140,0,255,0.3)',ballSpd:0.12,spiders:false,aliens:false,ballDefs:[{x:8.5,y:9.5,dx:1.1,dy:0.9,c:['#ff6b35','#ffb88a']},{x:W-10.5,y:15.5,dx:-0.9,dy:1.2,c:['#00b4d8','#90e0ef']},{x:W/2,y:H-10.5,dx:1.0,dy:-1.0,c:['#2ecc71','#a8e6cf']},{x:20.5,y:25.5,dx:-1.2,dy:0.8,c:['#f1c40f','#f9e79f']},{x:W-8.5,y:H-8.5,dx:-1.1,dy:-0.9,c:['#e91e8c','#ff80c0']}],stars:true,title:'🚀 כובש החלל',chip:'🌌 שלב 2',nextIcon:'🕷️',nextMsg:'עכשיו לעולם ספיידרמן!'},
  3:{bodyBg:'#0d0003',emptyColor:null,fillColor:'#8b0000',tailColor:'#1a44cc',playerGlow:'#4488ff',ringColor:'rgba(200,0,0,0.6)',canvasBorder:'rgba(200,0,0,0.5)',canvasShadow:'0 0 30px rgba(200,0,0,0.35)',ballSpd:0.08,spiders:true,aliens:false,ballDefs:[{x:8.5,y:8.5,dx:1.0,dy:0.85},{x:W-9.5,y:9.5,dx:-0.9,dy:1.0},{x:9.5,y:H-9.5,dx:1.1,dy:-0.9},{x:W-9.5,y:H-9.5,dx:-1.0,dy:-1.0}],stars:false,title:'🕷️ ספיידרמן',chip:'🕸️ שלב 3',nextIcon:'👾',nextMsg:'עכשיו לחלליות!'},
  4:{bodyBg:'#000510',emptyColor:null,fillColor:'#003820',tailColor:'#00ff88',playerGlow:'#00ff88',ringColor:'rgba(0,255,136,0.35)',canvasBorder:'rgba(0,200,100,0.4)',canvasShadow:'0 0 30px rgba(0,180,80,0.35)',ballSpd:0,spiders:false,aliens:true,ballDefs:[],stars:true,title:'👾 חלליות',chip:'👾 שלב 4',nextIcon:'🧜‍♀️',nextMsg:'עכשיו לבתולות הים!'},
  5:{bodyBg:'#00080f',emptyColor:null,fillColor:'#002244',tailColor:'#00ccff',playerGlow:'#00ccff',ringColor:'rgba(0,200,255,0.35)',canvasBorder:'rgba(0,180,255,0.4)',canvasShadow:'0 0 30px rgba(0,150,255,0.35)',ballSpd:0,spiders:false,aliens:false,ballDefs:[],stars:false,title:'🧜‍♀️ בתולות הים',chip:'🧜‍♀️ שלב 5',nextIcon:null,nextMsg:null},
};

// ── Shared state ──────────────────────────────────────────────────────────────
let grid,player,balls,lives,running,rafId,frame,keys,level,theme,stars;
let l4={};
const isBreakout=()=>level===4||level===5;

// ── Stars ─────────────────────────────────────────────────────────────────────
function genStars(){stars=[];for(let i=0;i<130;i++)stars.push({px:Math.random()*CW,py:Math.random()*CH,r:Math.random()*1.3+0.2,phase:Math.random()*Math.PI*2,spd:0.018+Math.random()*0.04});}
function initGrid(){grid=Array.from({length:H},()=>new Uint8Array(W));for(let x=0;x<W;x++){grid[0][x]=FILLED;grid[H-1][x]=FILLED;}for(let y=0;y<H;y++){grid[y][0]=FILLED;grid[y][W-1]=FILLED;}}

// ══════════════════════════════════════════════════════════════════════════════
// BREAKOUT LEVELS (4 & 5)
// ══════════════════════════════════════════════════════════════════════════════
const L4_PADDLE_Y=CH-32;
const L4_AW=46,L4_AH=22;
const L4_ALIEN_COLORS=['#ff4455','#ff8844','#ffcc33','#44ee44'];
const L5_LOSE_Y=L4_PADDLE_Y-55;
const L5_MW=54,L5_MH=48;
const L5_COLORS=['#ff88cc','#ff55aa','#cc44ff','#88aaff'];

function initL4(){
  const colStep=(CW-28)/10,startX=14+colStep/2;
  l4={paddle:{x:CW/2,w:86,h:12},balls:[{x:CW/2,y:L4_PADDLE_Y-6-BALL_R,dx:0,dy:0,stuck:true}],aliens:[],powerups:[],bullets:[],hasGun:0,stickyNext:false};
  for(let r=0;r<4;r++)for(let c=0;c<10;c++)l4.aliens.push({x:startX+c*colStep,y:52+r*36,alive:true,row:r});
}
function initL5(){
  const colStep=(CW-40)/8,startX=20+colStep/2;
  l4={paddle:{x:CW/2,w:86,h:12},balls:[{x:CW/2,y:L4_PADDLE_Y-6-BALL_R,dx:0,dy:0,stuck:true}],mermaids:[],powerups:[],bullets:[],hasGun:0,stickyNext:false};
  for(let r=0;r<4;r++)for(let c=0;c<8;c++)l4.mermaids.push({x:startX+c*colStep,y:30+r*52,alive:true,row:r,spd:0.15+Math.random()*0.12});
}
function brkLaunchBall(b){const spd=4.4,ang=(Math.random()-0.5)*0.9-Math.PI/2;b.dx=spd*Math.cos(ang);b.dy=spd*Math.sin(ang);b.stuck=false;}
function brkSpacePress(){
  if(!running){goToMenu();return;}
  for(const b of l4.balls){if(b.stuck){brkLaunchBall(b);return;}}
  if(l4.hasGun>0){l4.bullets.push({x:l4.paddle.x,y:L4_PADDLE_Y-l4.paddle.h/2-4,dy:-9});l4.hasGun--;}
}
function dropPowerup(x,y){
  const r=Math.random();
  if(r<0.07)l4.powerups.push({x,y,type:'gun',dy:2});
  else if(r<0.18)l4.powerups.push({x,y,type:'sticky',dy:2});
  else if(r<0.28)l4.powerups.push({x,y,type:'multi',dy:2});
}
function brkDie(){
  lives--;
  if(lives<=0){persistScore();running=false;showOverlay('נפלת! 💀','נגמרו הלבבות');return;}
  l4.balls=[{x:l4.paddle.x,y:L4_PADDLE_Y-l4.paddle.h/2-BALL_R,dx:0,dy:0,stuck:true}];
  l4.stickyNext=false;l4.bullets=[];
}
function updatePowerups(){
  const pd=l4.paddle;
  for(let pi=l4.powerups.length-1;pi>=0;pi--){
    const p=l4.powerups[pi];p.y+=p.dy;
    if(p.y+14>=L4_PADDLE_Y-pd.h/2&&p.y-14<=L4_PADDLE_Y+pd.h/2&&Math.abs(p.x-pd.x)<pd.w/2+14){
      if(p.type==='sticky')l4.stickyNext=true;
      else if(p.type==='multi'){const ref=l4.balls.find(b=>!b.stuck);if(ref)l4.balls.push({x:ref.x,y:ref.y,dx:-ref.dx*0.9+0.8,dy:-Math.abs(ref.dy),stuck:false});else l4.balls.push({x:pd.x,y:L4_PADDLE_Y-pd.h/2-BALL_R,dx:0,dy:0,stuck:true});}
      else if(p.type==='gun')l4.hasGun+=6;
      l4.powerups.splice(pi,1);continue;
    }
    if(p.y>CH+20)l4.powerups.splice(pi,1);
  }
}
function moveBrkBalls(hitFn){
  const pd=l4.paddle;
  for(let bi=l4.balls.length-1;bi>=0;bi--){
    const b=l4.balls[bi];
    if(b.stuck){b.x=pd.x;b.y=L4_PADDLE_Y-pd.h/2-BALL_R;continue;}
    b.x+=b.dx;b.y+=b.dy;
    if(b.x-BALL_R<14){b.x=14+BALL_R;b.dx=Math.abs(b.dx);}
    if(b.x+BALL_R>CW-14){b.x=CW-14-BALL_R;b.dx=-Math.abs(b.dx);}
    if(b.y-BALL_R<14){b.y=14+BALL_R;b.dy=Math.abs(b.dy);}
    const oy=L4_PADDLE_Y;
    if(b.dy>0&&b.y+BALL_R>=oy-pd.h/2&&b.y-BALL_R<=oy+pd.h/2&&b.x>pd.x-pd.w/2-BALL_R&&b.x<pd.x+pd.w/2+BALL_R){
      if(l4.stickyNext){b.stuck=true;b.dx=0;b.dy=0;l4.stickyNext=false;}
      else{const rel=(b.x-pd.x)/(pd.w/2),ang=rel*65*Math.PI/180,spd=Math.hypot(b.dx,b.dy);b.dx=spd*Math.sin(ang);b.dy=-Math.abs(spd*Math.cos(ang));b.y=oy-pd.h/2-BALL_R-0.5;}
    }
    if(b.y-BALL_R>CH+10){l4.balls.splice(bi,1);continue;}
    hitFn(b,bi);
  }
}
function updateL4(){
  const pd=l4.paddle;
  if(keys['ArrowLeft'])pd.x=Math.max(pd.w/2+14,pd.x-5.5);
  if(keys['ArrowRight'])pd.x=Math.min(CW-pd.w/2-14,pd.x+5.5);
  moveBrkBalls((b)=>{
    for(const a of l4.aliens){if(!a.alive)continue;const dx=Math.abs(b.x-a.x),dy=Math.abs(b.y-a.y),hw=L4_AW/2+BALL_R,hh=L4_AH/2+BALL_R;if(dx<hw&&dy<hh){a.alive=false;if((hw-dx)<(hh-dy))b.dx=-b.dx;else b.dy=-b.dy;dropPowerup(a.x,a.y);break;}}
  });
  if(l4.balls.length===0){brkDie();return;}
  updatePowerups();
  const alive=l4.aliens.filter(a=>a.alive).length;
  if(alive===0){currentScore+=LEVEL_SCORES[4];updateHUD();persistScore();running=false;showOverlay('שלב 4 הושלם! 🏆👾','כבשת את הגלקסיה!');}
}
function updateL5(){
  const pd=l4.paddle;
  if(keys['ArrowLeft'])pd.x=Math.max(pd.w/2+14,pd.x-5.5);
  if(keys['ArrowRight'])pd.x=Math.min(CW-pd.w/2-14,pd.x+5.5);
  // Descend
  for(const m of l4.mermaids){if(!m.alive)continue;m.y+=m.spd;if(m.y>L5_LOSE_Y){persistScore();running=false;showOverlay('הפסדת! 🧜‍♀️','בתולת הים הגיעה לחוף!');return;}}
  moveBrkBalls((b)=>{
    for(const m of l4.mermaids){if(!m.alive)continue;if(Math.abs(b.x-m.x)<L5_MW/2&&Math.abs(b.y-m.y)<L5_MH/2){m.alive=false;b.dy=-Math.abs(b.dy);dropPowerup(m.x,m.y);break;}}
  });
  if(l4.balls.length===0){brkDie();return;}
  // Bullets
  for(let bi=l4.bullets.length-1;bi>=0;bi--){
    const b=l4.bullets[bi];b.y+=b.dy;if(b.y<10){l4.bullets.splice(bi,1);continue;}
    let hit=false;
    for(const m of l4.mermaids){if(!m.alive)continue;if(Math.abs(b.x-m.x)<L5_MW/2+4&&Math.abs(b.y-m.y)<L5_MH/2+4){m.alive=false;dropPowerup(m.x,m.y);hit=true;break;}}
    if(hit)l4.bullets.splice(bi,1);
  }
  updatePowerups();
  const alive=l4.mermaids.filter(m=>m.alive).length;
  if(alive===0){currentScore+=LEVEL_SCORES[5];updateHUD();persistScore();running=false;showOverlay('ניצחת! 🏆🧜‍♀️','הגנת על החוף — אלוף האוקיינוס!');}
}

function drawAlienSprite(cx,cy,s,color){const ox=cx-5.5*s,oy=cy-4*s;ctx.shadowBlur=10;ctx.shadowColor=color;ctx.fillStyle=color;for(const[px,py]of ALIEN_PIX)ctx.fillRect(ox+px*s,oy+py*s,s,s);ctx.shadowBlur=0;}

  ctx.shadowBlur=0;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-3*s,-11*s,1.5*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3*s,-11*s,1.5*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(-2.4*s,-11.5*s,0.6*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3.6*s,-11.5*s,0.6*s,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.shadowBlur=0;
}
function drawBrkPaddle(){

}
function drawBrkBalls(){

    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.arc(b.x-BALL_R*.3,b.y-BALL_R*.3,BALL_R*.3,0,Math.PI*2);ctx.fill();
    if(b.stuck){ctx.strokeStyle=l4.stickyNext?'#00ddff':'rgba(0,255,200,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(b.x,b.y,BALL_R+4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}

function drawBrkPowerups(){
  ctx.font='bold 14px "Segoe UI",Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  for(const p of l4.powerups){const col=p.type==='gun'?'#ff4444':p.type==='sticky'?'#00ddff':'#44ff44';ctx.shadowBlur=14;ctx.shadowColor=col;ctx.fillStyle=col;ctx.beginPath();ctx.arc(p.x,p.y,13,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#000';ctx.fillText(p.type==='gun'?'ר':p.type==='sticky'?'ד':'+',p.x,p.y+1);}
}
function drawBrkBullets(){for(const b of l4.bullets){ctx.shadowBlur=14;ctx.shadowColor='#ff4444';ctx.fillStyle='#ff8844';ctx.beginPath();ctx.ellipse(b.x,b.y,4,8,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}
function drawGunHud(){if(!l4.hasGun)return;ctx.fillStyle='rgba(255,80,80,0.9)';ctx.font='bold 12px Arial';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText(`🔫 ×${l4.hasGun}`,CW-16,20);}
function drawBrkProgress(tot,dead){ctx.fillStyle='rgba(0,255,136,0.3)';ctx.fillRect(14,14,(CW-28)*(dead/tot),3);}
function drawBrkHint(){if(l4.balls.some(b=>b.stuck)&&running){const c=level===5?'rgba(0,200,255,0.7)':'rgba(0,255,136,0.7)';ctx.fillStyle=c;ctx.font='12px Arial';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('לחץ Space לשחרור',CW/2,CH-16);}}

function drawL4(){
  ctx.fillStyle='#000510';ctx.fillRect(0,0,CW,CH);
  const neb=(cx,cy,cr,col)=>{const g=ctx.createRadialGradient(cx,cy,0,cx,cy,cr);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);};
  neb(CW*.3,CH*.35,CW*.42,'rgba(0,55,25,0.20)');neb(CW*.72,CH*.6,CW*.32,'rgba(0,25,55,0.16)');
  for(const s of stars){s.phase+=s.spd;const a=(0.2+0.8*(0.5+0.5*Math.sin(s.phase))).toFixed(2);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(s.px,s.py,s.r,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle='rgba(0,255,136,0.2)';ctx.lineWidth=1.5;ctx.strokeRect(14,14,CW-28,CH-28);

  for(const a of l4.aliens)if(a.alive)drawAlienSprite(a.x,a.y,alienS,L4_ALIEN_COLORS[a.row]);
  drawBrkPowerups();drawBrkPaddle();drawBrkBalls();drawGunHud();
  const tot=l4.aliens.length,dead=l4.aliens.filter(a=>!a.alive).length;drawBrkProgress(tot,dead);drawBrkHint();
}
function drawL5(){
  ctx.fillStyle='#00080f';ctx.fillRect(0,0,CW,CH);
  for(let i=0;i<8;i++){const x=CW*(i/8)+Math.sin(frame*0.008+i)*30;const g=ctx.createLinearGradient(x,0,x+40,CH);g.addColorStop(0,'rgba(0,150,255,0.04)');g.addColorStop(1,'rgba(0,50,100,0.01)');ctx.fillStyle=g;ctx.fillRect(x,0,40,CH);}

  ctx.strokeStyle='rgba(255,0,0,0.2)';ctx.lineWidth=1;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(14,L5_LOSE_Y);ctx.lineTo(CW-14,L5_LOSE_Y);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,60,60,0.35)';ctx.font='10px Arial';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText('⚠ קו אבדון',CW-16,L5_LOSE_Y);

function claimTerritory(){
  for(const[tx,ty]of player.tail)grid[ty][tx]=FILLED;player.tail=[];player.hasTail=false;
  const reach=new Uint8Array(W*H);
  for(const b of balls){const bx=Math.round(b.x)|0,by=Math.round(b.y)|0;if(!inB(bx,by)||grid[by][bx]!==EMPTY)continue;const i0=by*W+bx;if(reach[i0])continue;reach[i0]=1;const q=[bx,by];let qi=0;while(qi<q.length){const qx=q[qi++],qy=q[qi++];for(const[nx,ny]of[[qx-1,qy],[qx+1,qy],[qx,qy-1],[qx,qy+1]]){if(!inB(nx,ny))continue;const i=ny*W+nx;if(!reach[i]&&grid[ny][nx]===EMPTY){reach[i]=1;q.push(nx,ny);}}}}
  for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(grid[y][x]===EMPTY&&!reach[y*W+x])grid[y][x]=FILLED;
}
function filledPct(){
  if(level===4){if(!l4.aliens?.length)return 0;return l4.aliens.filter(a=>!a.alive).length/l4.aliens.length;}
  if(level===5){if(!l4.mermaids?.length)return 0;return l4.mermaids.filter(m=>!m.alive).length/l4.mermaids.length;}
  const border=W*2+(H-2)*2,inner=(W-2)*(H-2);let n=0;for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(grid[y][x]===FILLED)n++;return(n-border)/inner;
}
function updateHUD(){
  document.getElementById('livesEl').textContent=lives;
  document.getElementById('scoreEl').textContent=currentScore;
  document.getElementById('pctEl').textContent=Math.max(0,Math.round(filledPct()*100));
}
function die(){
  if(isBreakout()){brkDie();updateHUD();return;}
  if(player.blink>0)return;
  for(const[tx,ty]of player.tail)if(grid[ty][tx]===TAIL)grid[ty][tx]=EMPTY;
  player.tail=[];player.hasTail=false;lives--;
  if(lives<=0){persistScore();running=false;showOverlay('נפלת! 💀',`הגעת ל-${Math.round(filledPct()*100)}% — נגמרו הלבבות`);return;}
  player.x=W>>1;player.y=0;player.dx=0;player.dy=0;player.blink=150;
}
function movePlayer(){
  let wdx=0,wdy=0;
  if(keys['ArrowRight']){wdx=1;wdy=0;}else if(keys['ArrowLeft']){wdx=-1;wdy=0;}else if(keys['ArrowDown']){wdx=0;wdy=1;}else if(keys['ArrowUp']){wdx=0;wdy=-1;}
  if(wdx===0&&wdy===0){if(!player.hasTail)return;wdx=player.dx;wdy=player.dy;}
  if(player.hasTail&&wdx===-player.dx&&wdy===-player.dy){wdx=player.dx;wdy=player.dy;}
  player.dx=wdx;player.dy=wdy;
  const nx=player.x+wdx,ny=player.y+wdy;if(!inB(nx,ny))return;
  const cell=grid[ny][nx];if(cell===TAIL){die();return;}
  player.x=nx;player.y=ny;
  if(cell===FILLED){
    if(player.hasTail){
      claimTerritory();const pct=filledPct();
      if(pct>=WIN_PCT[level]){
        currentScore+=LEVEL_SCORES[level];updateHUD();
        running=false;
        if(level<5){
          document.getElementById('btnNext').textContent=`שלב הבא ${theme.nextIcon} (+${LEVEL_SCORES[level+1]} נק')`;
          document.getElementById('btnNext').style.display='inline-block';
          showOverlay(`שלב ${level} הושלם! ✨ +${LEVEL_SCORES[level]} נק'`,theme.nextMsg);
        }else{persistScore();showOverlay('ניצחת! 🏆','כבשת את כל השטחים — אלוף על!');}
      }
    }
  }else{grid[ny][nx]=TAIL;player.tail.push([nx,ny]);player.hasTail=true;}
}
function moveBall(b){
  let nx=b.x+b.dx;const cy=Math.round(b.y)|0,cxN=(b.dx>0?Math.ceil(nx-0.01):Math.floor(nx))|0;
  if(nx<1.01||nx>W-2.01||(inB(cxN,cy)&&grid[cy][cxN]===FILLED)){b.dx=-b.dx;nx=b.x+b.dx;}
  b.x=Math.max(1.01,Math.min(W-2.01,nx));
  let ny2=b.y+b.dy;const cx2=Math.round(b.x)|0,cyN=(b.dy>0?Math.ceil(ny2-0.01):Math.floor(ny2))|0;
  if(ny2<1.01||ny2>H-2.01||(inB(cx2,cyN)&&grid[cyN][cx2]===FILLED)){b.dy=-b.dy;ny2=b.y+b.dy;}
  b.y=Math.max(1.01,Math.min(H-2.01,ny2));
  if(b.trail!==null){b.trail.push({px:b.x*CS+CS/2,py:b.y*CS+CS/2});if(b.trail.length>MAX_WEB)b.trail.shift();}
}
function checkCollisions(){
  if(player.blink>0)return;
  for(const b of balls){if(Math.abs(b.x-player.x)<0.85&&Math.abs(b.y-player.y)<0.85){die();return;}for(const[tx,ty]of player.tail)if(Math.abs(b.x-tx)<0.85&&Math.abs(b.y-ty)<0.85){die();return;}}
  if(theme.spiders&&player.hasTail){const ws=new Set();for(const b of balls)for(const tp of b.trail)ws.add((tp.px/CS|0)+(tp.py/CS|0)*W);for(const[tx,ty]of player.tail)if(ws.has(tx+ty*W)){die();return;}}
}
// Xonix draw helpers
function drawWebBg(){ctx.fillStyle='#0d0003';ctx.fillRect(0,0,CW,CH);const cx=CW/2,cy=CH/2,maxR=Math.sqrt(cx*cx+cy*cy)+20;ctx.strokeStyle='rgba(160,0,0,0.10)';ctx.lineWidth=0.6;for(let a=0;a<Math.PI*2;a+=Math.PI/9){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*maxR,cy+Math.sin(a)*maxR);ctx.stroke();}for(let r=35;r<maxR;r+=35){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();}}
function drawSpider(bx,by){const br=CS/2+1;ctx.shadowBlur=16;ctx.shadowColor='#cc0000';ctx.fillStyle='#cc0000';ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.65)';ctx.lineWidth=0.8;for(let a=0;a<Math.PI*2;a+=Math.PI/5){ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a)*br,by+Math.sin(a)*br);ctx.stroke();}ctx.beginPath();ctx.arc(bx,by,br*0.5,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle='white';ctx.save();ctx.translate(bx-br*.30,by-br*.08);ctx.rotate(-0.38);ctx.beginPath();ctx.ellipse(0,0,br*.30,br*.17,0,0,Math.PI*2);ctx.fill();ctx.restore();ctx.save();ctx.translate(bx+br*.30,by-br*.08);ctx.rotate(0.38);ctx.beginPath();ctx.ellipse(0,0,br*.30,br*.17,0,0,Math.PI*2);ctx.fill();ctx.restore();ctx.shadowBlur=0;}
function drawWebTrail(trail){if(trail.length<2)return;ctx.strokeStyle='rgba(230,230,230,0.45)';ctx.lineWidth=1.0;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(trail[0].px,trail[0].py);for(let i=1;i<trail.length;i++)ctx.lineTo(trail[i].px,trail[i].py);ctx.stroke();}
function drawStarfield(bgColor,nebulas){ctx.fillStyle=bgColor;ctx.fillRect(0,0,CW,CH);for(const[cx,cy,cr,col]of nebulas){const g=ctx.createRadialGradient(cx,cy,0,cx,cy,cr);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);}for(const s of stars){s.phase+=s.spd;const a=(0.25+0.75*(0.5+0.5*Math.sin(s.phase))).toFixed(2);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(s.px,s.py,s.r,0,Math.PI*2);ctx.fill();}}
function drawFillGlow(gc,ec){ctx.strokeStyle=ec;ctx.lineWidth=1;for(let y=0;y<H;y++)for(let x=0;x<W;x++){if(grid[y][x]!==FILLED)continue;const he=(inB(x-1,y)&&grid[y][x-1]===EMPTY)||(inB(x+1,y)&&grid[y][x+1]===EMPTY)||(inB(x,y-1)&&grid[y-1]?.[x]===EMPTY)||(inB(x,y+1)&&grid[y+1]?.[x]===EMPTY);if(he){ctx.shadowBlur=6;ctx.shadowColor=gc;ctx.strokeRect(x*CS+.5,y*CS+.5,CS-1,CS-1);ctx.shadowBlur=0;}}}
function draw(){
  if(theme.spiders){drawWebBg();for(const b of balls)if(b.trail)drawWebTrail(b.trail);for(let y=0;y<H;y++)for(let x=0;x<W;x++){if(grid[y][x]===EMPTY)continue;ctx.fillStyle=grid[y][x]===FILLED?theme.fillColor:theme.tailColor;ctx.fillRect(x*CS,y*CS,CS,CS);}ctx.strokeStyle='rgba(200,50,50,0.25)';ctx.lineWidth=1;for(let y=0;y<H;y++)for(let x=0;x<W;x++){if(grid[y][x]!==FILLED)continue;const he=(inB(x-1,y)&&grid[y][x-1]===EMPTY)||(inB(x+1,y)&&grid[y][x+1]===EMPTY)||(inB(x,y-1)&&grid[y-1]?.[x]===EMPTY)||(inB(x,y+1)&&grid[y+1]?.[x]===EMPTY);if(he){ctx.shadowBlur=5;ctx.shadowColor='#ff2222';ctx.strokeRect(x*CS+.5,y*CS+.5,CS-1,CS-1);ctx.shadowBlur=0;}}}
  else if(theme.stars){drawStarfield('#00000a',[[CW*.25,CH*.35,CW*.38,'rgba(90,0,140,0.18)'],[CW*.75,CH*.65,CW*.32,'rgba(0,40,120,0.14)'],[CW*.55,CH*.2,CW*.25,'rgba(120,0,80,0.10)']]);for(let y=0;y<H;y++)for(let x=0;x<W;x++){if(grid[y][x]===EMPTY)continue;ctx.fillStyle=grid[y][x]===FILLED?theme.fillColor:theme.tailColor;ctx.fillRect(x*CS,y*CS,CS,CS);}drawFillGlow('#cc44ff','rgba(180,80,255,0.18)');}
  else{for(let y=0;y<H;y++)for(let x=0;x<W;x++){ctx.fillStyle=grid[y][x]===FILLED?theme.fillColor:grid[y][x]===TAIL?theme.tailColor:theme.emptyColor;ctx.fillRect(x*CS,y*CS,CS,CS);}ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;for(let i=0;i<=W;i++){ctx.beginPath();ctx.moveTo(i*CS,0);ctx.lineTo(i*CS,H*CS);ctx.stroke();}for(let i=0;i<=H;i++){ctx.beginPath();ctx.moveTo(0,i*CS);ctx.lineTo(W*CS,i*CS);ctx.stroke();}}
  ctx.strokeStyle=theme.ringColor;ctx.lineWidth=1.5;ctx.strokeRect(CS+1,CS+1,(W-2)*CS-2,(H-2)*CS-2);
  ctx.fillStyle=theme.tailColor+'55';ctx.fillRect(CS,CS,(W-2)*CS*filledPct(),3);
  if(player.blink===0||(frame>>2)&1){const px=player.x*CS+CS/2,py=player.y*CS+CS/2,r=CS/2-1;ctx.shadowBlur=16;ctx.shadowColor=theme.playerGlow;ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();ctx.fillStyle=theme.playerGlow;ctx.beginPath();ctx.arc(px,py,r-3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  for(const b of balls){const bx=b.x*CS+CS/2,by=b.y*CS+CS/2,br=CS/2;if(theme.spiders){drawSpider(bx,by);}else{ctx.shadowBlur=14;ctx.shadowColor=b.c[0];ctx.fillStyle=b.c[0];ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();ctx.fillStyle=b.c[1];ctx.beginPath();ctx.arc(bx-br*.3,by-br*.3,br*.35,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}
}

// ── Start level ───────────────────────────────────────────────────────────────
function startLevel(lvl){
  level=lvl;theme=THEMES[lvl];frame=0;running=true;keys={};
  if(lvl===4){initL4();genStars();document.getElementById('hint').textContent='חצים לזוז · Space — שחרר/ירי · ד=דבק · +=כדור נוסף · ר=רקטה';}
  else if(lvl===5){initL5();document.getElementById('hint').textContent='חצים לזוז · Space — שחרר/ירי · ד=דבק · +=כדור נוסף · ר=רקטה';}
  else{initGrid();player={x:W>>1,y:0,dx:0,dy:0,tail:[],hasTail:false,blink:0};const spd=theme.ballSpd;balls=theme.ballDefs.map(d=>({x:d.x,y:d.y,dx:spd*d.dx,dy:spd*d.dy,c:d.c??['#e74c3c','#f5b7b1'],trail:theme.spiders?[]:null}));if(theme.stars)genStars();else stars=[];document.getElementById('hint').textContent='חצי מקלדת לזוז · סגור שטח — כבוש!';}
  document.body.style.background=theme.bodyBg;canvas.style.borderColor=theme.canvasBorder;canvas.style.boxShadow=theme.canvasShadow;
  document.getElementById('title').textContent=theme.title;document.getElementById('levelChip').textContent=theme.chip;
  const gp=WIN_PCT[lvl];document.getElementById('goalEl').textContent=gp===1.0?'100':Math.round(gp*100);
  updateHUD();if(rafId)cancelAnimationFrame(rafId);rafId=requestAnimationFrame(loop);
}
function nextLevel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('btnNext').style.display='none';
  startLevel(level+1);
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(){
  if(!running){if(level===4)drawL4();else if(level===5)drawL5();else draw();return;}
  frame++;
  if(isBreakout()){if(level===4)updateL4();else updateL5();if(level===4)drawL4();else drawL5();}
  else{if(player.blink>0)player.blink--;if(frame%PLAYER_SPD===0)movePlayer();for(const b of balls)moveBall(b);checkCollisions();draw();}
  updateHUD();rafId=requestAnimationFrame(loop);
}
function showOverlay(t,m){document.getElementById('oTitle').textContent=t;document.getElementById('oMsg').textContent=m;document.getElementById('overlay').classList.add('show');}

// ── Input ─────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();if(isBreakout())brkSpacePress();}
  if(e.key==='Escape')goToMenu();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
const dMap={u:'ArrowUp',d:'ArrowDown',l:'ArrowLeft',r:'ArrowRight'};
function dp(dir){const k=dMap[dir];keys[k]=true;setTimeout(()=>{keys[k]=false;},200);}
window.addEventListener('mouseup',()=>Object.values(dMap).forEach(k=>keys[k]=false));
window.addEventListener('touchend',()=>Object.values(dMap).forEach(k=>keys[k]=false));
let tx0,ty0;
canvas.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx0,dy2=e.changedTouches[0].clientY-ty0;if(Math.abs(dx)<8&&Math.abs(dy2)<8){if(isBreakout())brkSpacePress();return;}if(Math.abs(dx)>Math.abs(dy2))dp(dx>0?'r':'l');else dp(dy2>0?'d':'u');e.preventDefault();},{passive:false});

// ── Boot ──────────────────────────────────────────────────────────────────────
playerName=localStorage.getItem('kbs_name')||'';
if(!playerName){showNameScreen();}
else{showMenu();}
</script>
